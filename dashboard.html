<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crosshair Way - Control Panel</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <img src="assets/logo.png" alt="Crosshair Way" class="logo-img">
        <h1>CROSSHAIR<br><span>WAY</span></h1>
      </div>
      <nav class="nav-menu">
        <button class="nav-item active" data-tab="crosshair">
          <span class="nav-icon">&#9672;</span>
          Crosshair
        </button>
        <button class="nav-item" data-tab="position">
          <span class="nav-icon">&#8663;</span>
          Position
        </button>
        <button class="nav-item" data-tab="display">
          <span class="nav-icon">&#9000;</span>
          Display
        </button>
        <button class="nav-item" data-tab="settings">
          <span class="nav-icon">&#9881;</span>
          Settings
        </button>
        <button class="nav-item" data-tab="about">
          <span class="nav-icon">&#9432;</span>
          About
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="visibility-toggle">
          <span>Crosshair</span>
          <label class="switch">
            <input type="checkbox" id="visibilityToggle" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </aside>

    <main class="content">
      <section id="tab-crosshair" class="tab-content active">
        <div class="tab-header">
          <h2>Crosshair Configuration</h2>
          <div class="mode-toggle">
            <button class="mode-btn active" data-mode="generator">Generator</button>
            <button class="mode-btn" data-mode="image">Custom Image</button>
          </div>
        </div>

        <div id="generator-controls" class="controls-panel">
          <div class="control-group">
            <label>Shape</label>
            <div class="shape-selector">
              <button class="shape-btn active" data-shape="cross">
                <svg viewBox="0 0 24 24"><path d="M10 2h4v8h8v4h-8v8h-4v-8H2v-4h8V2z" fill="currentColor"/></svg>
              </button>
              <button class="shape-btn" data-shape="dot">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="currentColor"/></svg>
              </button>
              <button class="shape-btn" data-shape="circle">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
              </button>
              <button class="shape-btn" data-shape="tshape">
                <svg viewBox="0 0 24 24"><path d="M2 2h20v4h-8v16h-4V6H2V2z" fill="currentColor"/></svg>
              </button>
            </div>
          </div>

          <div class="control-group">
            <label>Size: <span id="sizeValue">30</span>px</label>
            <input type="range" id="sizeSlider" min="10" max="100" value="30" class="glow-slider">
          </div>

          <div class="control-group">
            <label>Thickness: <span id="thicknessValue">3</span>px</label>
            <input type="range" id="thicknessSlider" min="1" max="12" value="3" class="glow-slider">
          </div>

          <div class="control-group">
            <label>Gap: <span id="gapValue">6</span>px</label>
            <input type="range" id="gapSlider" min="0" max="30" value="6" class="glow-slider">
          </div>

          <div class="control-group">
            <label>Color</label>
            <div class="color-picker-row">
              <input type="color" id="colorPicker" value="#ff6600">
              <input type="text" id="colorHex" value="#ff6600" maxlength="7">
            </div>
          </div>

          <div class="control-group">
            <label>Opacity: <span id="opacityValue">80</span>%</label>
            <input type="range" id="opacitySlider" min="5" max="100" value="80" class="glow-slider">
          </div>

          <div class="control-separator"></div>

          <div class="control-group">
            <div class="control-header-row">
              <label>Outline</label>
              <label class="switch">
                <input type="checkbox" id="outlineToggle">
                <span class="slider"></span>
              </label>
            </div>
          </div>

          <div id="outline-controls" class="controls-panel">
            <div class="control-group">
              <label>Thickness: <span id="outlineThicknessValue">1</span>px</label>
              <input type="range" id="outlineThicknessSlider" min="1" max="5" value="1" class="glow-slider">
            </div>
            <div class="control-group">
              <label>Outline Color</label>
              <div class="color-picker-row">
                <input type="color" id="outlineColorPicker" value="#000000">
                <input type="text" id="outlineColorHex" value="#000000" maxlength="7">
              </div>
            </div>
          </div>
        </div>

        <div id="image-controls" class="controls-panel hidden">
          <div class="control-group">
            <label>Custom Crosshair Image</label>
            <button id="pickImageBtn" class="action-btn">Select PNG File</button>
            <p id="imagePathDisplay" class="file-path">No image selected</p>
          </div>
          <div class="control-group">
            <label>Image Size: <span id="imageSizeValue">60</span>px</label>
            <input type="range" id="imageSizeSlider" min="20" max="200" value="60" class="glow-slider">
          </div>
        </div>
      </section>

      <section id="tab-position" class="tab-content">
        <div class="tab-header">
          <h2>Position Calibration</h2>
        </div>
        <div class="controls-panel">
          <div class="control-group">
            <label>X Offset: <span id="offsetXValue">0</span>px</label>
            <input type="range" id="offsetXSlider" min="-200" max="200" value="0" class="glow-slider">
          </div>
          <div class="control-group">
            <label>Y Offset: <span id="offsetYValue">0</span>px</label>
            <input type="range" id="offsetYSlider" min="-200" max="200" value="0" class="glow-slider">
          </div>
          <button id="resetPositionBtn" class="action-btn secondary">Reset to Center</button>
        </div>
      </section>

      <section id="tab-display" class="tab-content">
        <div class="tab-header">
          <h2>Display Settings</h2>
        </div>
        <div class="controls-panel">
          <div class="control-group">
            <label>Monitor</label>
            <select id="monitorSelect" class="glow-select"></select>
          </div>
        </div>
      </section>

      <section id="tab-settings" class="tab-content">
        <div class="tab-header">
          <h2>Application Settings</h2>
        </div>
        <div class="controls-panel">
          <div class="control-group row">
            <label>Launch on Windows Startup</label>
            <label class="switch">
              <input type="checkbox" id="autoStartToggle">
              <span class="slider"></span>
            </label>
          </div>
          <div class="control-group row">
            <label>Global Toggle Hotkey</label>
            <button id="hotkeyBindBtn" class="hotkey-bind-btn">Ctrl + Shift + H</button>
          </div>
          <div class="control-group row">
            <label>Version</label>
            <span class="version-badge">v1.0.0</span>
          </div>
        </div>
      </section>

      <section id="tab-about" class="tab-content">
        <div class="about-container">
          <div class="about-branding">
            <img src="assets/logo.png" alt="Crosshair Way" class="about-logo">
            <h1 class="about-title">Crosshair Way</h1>
            <p class="about-subtitle">Premium Crosshair Overlay</p>
          </div>
          <div class="about-divider"></div>
          <div class="about-credits">
            <p class="about-creator">Created by <strong>Way-cfg</strong></p>
            <button id="githubProfileBtn" class="github-btn">
              <span class="github-icon">&#128279;</span>
              Visit GitHub Profile
            </button>
          </div>
          <div class="about-footer">
            <span class="about-version">v1.0.0</span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
